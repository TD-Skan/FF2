name: Update FPL Data

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download FPL JSON data
        run: |
          mkdir -p data
          curl -L --fail --retry 3 https://fantasy.premierleague.com/api/bootstrap-static/ -o data/bootstrap-static.json
          curl -L --fail --retry 3 https://fantasy.premierleague.com/api/fixtures/ -o data/fixtures.json

      - name: Validate and create metadata
        run: |
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          with open('data/bootstrap-static.json', 'r', encoding='utf-8') as f:
              b = json.load(f)
          with open('data/fixtures.json', 'r', encoding='utf-8') as f:
              fixtures = json.load(f)
          assert isinstance(b.get('elements'), list), 'bootstrap-static missing elements list'
          assert isinstance(b.get('events'), list), 'bootstrap-static missing events list'
          assert isinstance(b.get('teams'), list), 'bootstrap-static missing teams list'
          assert isinstance(b.get('element_types'), list), 'bootstrap-static missing element_types list'
          assert isinstance(fixtures, list), 'fixtures must be a list'
          years = []
          for e in b.get('events', []):
              d = e.get('deadline_time')
              if d:
                  try: years.append(int(d[:4]))
                  except Exception: pass
          inferred = 'Unknown'
          if years:
              inferred = f"{min(years)}/{str(max(years))[-2:]}"
          metadata = {
              'data_source': 'Fantasy Premier League bootstrap-static and fixtures endpoints',
              'downloaded_at_utc': datetime.now(timezone.utc).isoformat(),
              'inferred_season': inferred,
              'event_count': len(b.get('events', [])),
              'player_count': len(b.get('elements', [])),
              'fixture_count': len(fixtures),
              'first_deadline': b.get('events', [{}])[0].get('deadline_time') if b.get('events') else None,
              'last_deadline': b.get('events', [{}])[-1].get('deadline_time') if b.get('events') else None
          }
          with open('data/metadata.json', 'w', encoding='utf-8') as f:
              json.dump(metadata, f, indent=2)
          print(json.dumps(metadata, indent=2))
          PY

      - name: Commit data updates
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/bootstrap-static.json data/fixtures.json data/metadata.json
          git diff --cached --quiet || git commit -m "Update FPL data"
          git push
